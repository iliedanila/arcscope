name: publish

# Release flow: bump the version in package.json, commit, then
#   git tag vX.Y.Z && git push --tags
# This builds, tests, verifies the tag matches package.json, and publishes to npm.
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # required for npm provenance (signed build attestation via OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG  package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      # `npm publish` runs prepack (npm run build), so dist/ is built fresh here.
      # --provenance stamps a verifiable build attestation; needs id-token: write above.
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
